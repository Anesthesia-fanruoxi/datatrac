{{define "datasource/index.html"}}
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{.Title}} - DataTrace</title>
    <link href="/static/vendor/bootstrap/bootstrap.min.css" rel="stylesheet">
    <link href="/static/vendor/bootstrap-icons/bootstrap-icons.css" rel="stylesheet">
    <link href="/static/css/style.css" rel="stylesheet">
    <link href="/static/components/toast/toast.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/modules/datasource/datasource.css">
    <link rel="stylesheet" href="/static/components/utils/common.css">
    <link rel="stylesheet" href="/static/components/modal/modal.css">
</head>
<body>

<!-- 左侧菜单 -->
<div class="sidebar">
    <div class="logo">
        <h5><i class="bi bi-arrow-left-right"></i> DataTrace</h5>
    </div>
    <ul class="menu">
        <li>
            <a href="/datasources" class="{{if eq .Active "datasources"}}active{{end}}">
                <i class="bi bi-database"></i> 数据源配置
            </a>
        </li>
        <li>
            <a href="/credentials" class="{{if eq .Active "credentials"}}active{{end}}">
                <i class="bi bi-key"></i> 凭据管理
            </a>
        </li>
        <li>
            <a href="/task-config" class="{{if eq .Active "task-config"}}active{{end}}">
                <i class="bi bi-gear"></i> 任务配置
            </a>
        </li>
        <li>
            <a href="/task-monitor" class="{{if eq .Active "task-monitor"}}active{{end}}">
                <i class="bi bi-activity"></i> 任务执行监控
            </a>
        </li>
    </ul>
</div>

<!-- Toast 通知容器 -->
<div class="toast-container"></div>

<!-- 主内容区 -->
<div class="main-content">
    <div id="datasource-container">
        <div class="datasource-header">
            <h4><i class="bi bi-database"></i> 数据源配置</h4>
            <button class="btn btn-primary" onclick="DataSourceCore.showAdd()">
                <i class="bi bi-plus-circle"></i> 新建数据源
            </button>
        </div>
        
        <div class="datasource-table">
            <table class="table table-hover">
                <thead>
                    <tr>
                        <th>名称</th>
                        <th>类型</th>
                        <th>地址</th>
                        <th>连接状态</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody id="datasourceList">
                    <tr>
                        <td colspan="5" class="text-center text-muted">
                            <div class="spinner-border spinner-border-sm me-2"></div>
                            加载中...
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<!-- 新建/编辑数据源模态框 -->
<div id="datasourceModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.6); z-index:1000; backdrop-filter: blur(5px);">
    <div style="position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); background:white; padding:0; border-radius:15px; width:500px; max-height:80vh; overflow-y:auto; box-shadow: 0 20px 60px rgba(0,0,0,0.3);">
        <div style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); padding: 20px; border-radius: 15px 15px 0 0;">
            <h5 id="modalTitle" style="color: white; margin: 0;">新建数据源</h5>
        </div>
        <div style="padding: 30px;">
            <form id="datasourceForm">
                <input type="hidden" id="datasourceId">
                
                <div class="mb-3">
                    <label class="form-label">名称 <span class="text-danger">*</span></label>
                    <input type="text" class="form-control" id="dsName" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">类型 <span class="text-danger">*</span></label>
                    <select class="form-select" id="dsType" required>
                        <option value="">请选择</option>
                        <option value="mysql">MySQL</option>
                        <option value="elasticsearch">Elasticsearch</option>
                    </select>
                </div>

                <div class="row">
                    <div class="col-8">
                        <div class="mb-3">
                            <label class="form-label">主机 <span class="text-danger">*</span></label>
                            <input type="text" class="form-control" id="dsHost" placeholder="localhost" required>
                        </div>
                    </div>
                    <div class="col-4">
                        <div class="mb-3">
                            <label class="form-label">端口 <span class="text-danger">*</span></label>
                            <input type="number" class="form-control" id="dsPort" placeholder="3306" required>
                        </div>
                    </div>
                </div>

                <div class="mb-3">
                    <label class="form-label">认证方式 <span class="text-danger">*</span></label>
                    <div class="btn-group w-100" role="group" aria-label="认证方式">
                        <input type="radio" class="btn-check" name="authType" id="authTypeManual" value="manual" autocomplete="off" checked onchange="DataSourceCore.toggleAuthType()">
                        <label class="btn btn-outline-primary" for="authTypeManual">
                            <i class="bi bi-person me-1"></i>手动输入
                        </label>
                        <input type="radio" class="btn-check" name="authType" id="authTypeCredential" value="credential" autocomplete="off" onchange="DataSourceCore.toggleAuthType()">
                        <label class="btn btn-outline-primary" for="authTypeCredential">
                            <i class="bi bi-key me-1"></i>使用凭据
                        </label>
                    </div>
                </div>

                <div id="credentialGroup" style="display:none;">
                    <div class="mb-3">
                        <label class="form-label">选择凭据 <span class="text-danger">*</span></label>
                        <div class="input-group has-validation">
                            <span class="input-group-text bg-light">
                                <i class="bi bi-key text-secondary"></i>
                            </span>
                            <input type="text" class="form-control" id="dsCredentialName" readonly placeholder="点击右侧按钮选择凭据">
                            <input type="hidden" id="dsCredential">
                            <button type="button" class="btn btn-primary" onclick="DataSourceCore.showCredentialSelector()">
                                <i class="bi bi-list-ul me-1"></i>选择
                            </button>
                        </div>
                    </div>
                </div>

                <div id="manualAuthGroup">
                    <div class="mb-3">
                        <label class="form-label">用户名 <span class="text-danger">*</span></label>
                        <input type="text" class="form-control" id="dsUsername">
                    </div>

                    <div class="mb-3">
                        <label class="form-label">密码 <span class="text-danger">*</span></label>
                        <input type="password" class="form-control" id="dsPassword">
                    </div>
                </div>

                <div class="mb-3" id="dbNameGroup" style="display:none;">
                    <label class="form-label">数据库名称</label>
                    <input type="text" class="form-control" id="dsDatabase">
                    <div class="form-text">可选，留空表示不指定数据库</div>
                </div>

                <div class="d-flex justify-content-end gap-2">
                    <button type="button" class="btn btn-secondary" onclick="DataSourceCore.closeModal()">取消</button>
                    <button type="button" class="btn btn-info" onclick="DataSourceCore.testConnection()">
                        <i class="bi bi-plug"></i> 测试连接
                    </button>
                    <button type="submit" class="btn btn-primary">
                        <i class="bi bi-check-circle"></i> 保存
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>

<!-- 选择凭据弹框 -->
<div id="credentialSelectModal" class="credential-select-modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:1001; backdrop-filter: blur(6px); align-items:center; justify-content:center;" onclick="if(event.target===this) DataSourceCore.closeCredentialSelectModal()">
    <div class="credential-select-dialog bg-white rounded-4 shadow" style="width: 640px; max-height: 88vh; overflow: hidden; display: flex; flex-direction: column;">
        <div class="credential-select-header">
            <h5 class="mb-0 text-white d-flex align-items-center">
                <i class="bi bi-key-fill me-2 opacity-90"></i>选择凭据
            </h5>
            <div class="d-flex align-items-center gap-2">
                <button type="button" class="btn btn-light btn-sm px-3" onclick="DataSourceCore.showAddCredentialForm()">
                    <i class="bi bi-plus-lg me-1"></i>新建凭据
                </button>
                <button type="button" class="btn btn-link btn-sm p-0 text-white opacity-75 hover-opacity-100" style="min-width: 32px;" aria-label="关闭" onclick="DataSourceCore.closeCredentialSelectModal()">
                    <i class="bi bi-x-lg"></i>
                </button>
            </div>
        </div>
        <div class="credential-select-body overflow-auto flex-grow-1" style="min-height: 260px;">
            <table class="credential-select-table mb-0">
                <thead>
                    <tr>
                        <th>名称</th>
                        <th>用户名</th>
                        <th>描述</th>
                        <th class="text-end" style="width: 180px;">操作</th>
                    </tr>
                </thead>
                <tbody id="credentialSelectList">
                    <tr><td colspan="4" class="text-center text-muted py-5">
                        <div class="spinner-border spinner-border-sm text-primary me-2" role="status"></div>
                        加载中...
                    </td></tr>
                </tbody>
            </table>
        </div>
        <div class="credential-select-footer d-flex justify-content-end px-3 py-3">
            <button type="button" class="btn btn-outline-secondary" onclick="DataSourceCore.closeCredentialSelectModal()">取消</button>
        </div>
    </div>
</div>

<!-- 凭据表单弹框（添加/编辑） -->
<div id="credentialFormModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.6); z-index:1002; align-items:center; justify-content:center; backdrop-filter: blur(3px);" onclick="if(event.target===this) DataSourceCore.closeCredentialFormModal()">
    <div class="bg-white rounded-4 shadow-lg" style="width: 500px;">
        <div style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); padding: 18px 24px; border-radius: 1rem 1rem 0 0;">
            <h6 class="mb-0 text-white" id="credentialFormModalTitle"><i class="bi bi-key me-2"></i>新建凭据</h6>
        </div>
        <form id="credentialFormInModal">
            <input type="hidden" id="credentialFormId" value="">
            <div class="p-4">
                <div class="mb-3">
                    <label class="form-label">名称 <span class="text-danger">*</span></label>
                    <input type="text" class="form-control" id="credFormName" required placeholder="例如: 测试环境凭据">
                </div>
                <div class="mb-3">
                    <label class="form-label">用户名 <span class="text-danger">*</span></label>
                    <input type="text" class="form-control" id="credFormUsername" required placeholder="数据库用户名">
                </div>
                <div class="mb-3">
                    <label class="form-label">密码 <span class="text-danger" id="credFormPasswordRequired">*</span></label>
                    <input type="password" class="form-control" id="credFormPassword" placeholder="编辑时留空不修改">
                </div>
                <div class="mb-3">
                    <label class="form-label">描述</label>
                    <textarea class="form-control" id="credFormDescription" rows="2" placeholder="可选，描述此凭据的用途"></textarea>
                </div>
            </div>
            <div class="px-4 pb-4 d-flex justify-content-end gap-2">
                <button type="button" class="btn btn-secondary" onclick="DataSourceCore.closeCredentialFormModal()">取消</button>
                <button type="submit" class="btn btn-primary"><i class="bi bi-check-circle me-1"></i>保存</button>
            </div>
        </form>
    </div>
</div>

<!-- Bootstrap JS -->
<script src="/static/vendor/bootstrap/bootstrap.bundle.min.js"></script>

<!-- 通用组件 -->
<script src="/static/components/utils/format.js"></script>
<script src="/static/components/utils/http.js"></script>
<script src="/static/components/toast/toast.js"></script>
<script src="/static/components/modal/modal.js"></script>

<!-- 加载数据源模块 -->
<script src="/static/modules/datasource/sse.js"></script>
<script src="/static/modules/datasource/datasource.js"></script>
<script src="/static/modules/datasource/index.js"></script>

<script>
    // 初始化模块
    DataSourceModule.init();
</script>

</body>
</html>
{{end}}
