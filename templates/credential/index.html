{{define "credential/index.html"}}
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{.Title}} - DataTrace</title>
    <link href="/static/vendor/bootstrap/bootstrap.min.css" rel="stylesheet">
    <link href="/static/vendor/bootstrap-icons/bootstrap-icons.css" rel="stylesheet">
    <link href="/static/css/style.css" rel="stylesheet">
    <link href="/static/components/toast/toast.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/modules/credential/credential.css">
    <link rel="stylesheet" href="/static/components/utils/common.css">
    <link rel="stylesheet" href="/static/components/modal/modal.css">
</head>
<body>

<!-- 左侧菜单 -->
<div class="sidebar">
    <div class="logo">
        <h5><i class="bi bi-arrow-left-right"></i> DataTrace</h5>
    </div>
    <ul class="menu">
        <li>
            <a href="/datasources" class="{{if eq .Active "datasources"}}active{{end}}">
                <i class="bi bi-database"></i> 数据源配置
            </a>
        </li>
        <li>
            <a href="/credentials" class="{{if eq .Active "credentials"}}active{{end}}">
                <i class="bi bi-key"></i> 凭据管理
            </a>
        </li>
        <li>
            <a href="/task-config" class="{{if eq .Active "task-config"}}active{{end}}">
                <i class="bi bi-gear"></i> 任务配置
            </a>
        </li>
        <li>
            <a href="/task-monitor" class="{{if eq .Active "task-monitor"}}active{{end}}">
                <i class="bi bi-activity"></i> 任务执行监控
            </a>
        </li>
    </ul>
</div>

<!-- Toast 通知容器 -->
<div class="toast-container"></div>

<!-- 主内容区 -->
<div class="main-content">
    <div id="credential-container">
        <div class="credential-header">
            <h4><i class="bi bi-key"></i> 凭据管理</h4>
            <button class="btn btn-primary" onclick="CredentialCore.showAdd()">
                <i class="bi bi-plus-circle"></i> 新建凭据
            </button>
        </div>
        
        <div class="credential-table">
            <table class="table table-hover">
                <thead>
                    <tr>
                        <th>名称</th>
                        <th>用户名</th>
                        <th>描述</th>
                        <th>创建时间</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody id="credentialList">
                    <tr>
                        <td colspan="5" class="text-center text-muted">
                            <div class="spinner-border spinner-border-sm me-2"></div>
                            加载中...
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<!-- 新建/编辑凭据模态框 -->
<div id="credentialModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.6); z-index:1000; backdrop-filter: blur(5px);">
    <div style="position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); background:white; padding:0; border-radius:15px; width:500px; max-height:80vh; overflow-y:auto; box-shadow: 0 20px 60px rgba(0,0,0,0.3);">
        <div style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); padding: 20px; border-radius: 15px 15px 0 0;">
            <h5 id="modalTitle" style="color: white; margin: 0;">新建凭据</h5>
        </div>
        <div style="padding: 30px;">
            <form id="credentialForm">
                <input type="hidden" id="credentialId">
                
                <div class="mb-3">
                    <label class="form-label">名称 <span class="text-danger">*</span></label>
                    <input type="text" class="form-control" id="credName" required placeholder="例如: 测试环境凭据">
                </div>

                <div class="mb-3">
                    <label class="form-label">用户名 <span class="text-danger">*</span></label>
                    <input type="text" class="form-control" id="credUsername" required placeholder="数据库用户名">
                </div>

                <div class="mb-3">
                    <label class="form-label">密码 <span class="text-danger">*</span></label>
                    <input type="password" class="form-control" id="credPassword" required placeholder="数据库密码">
                </div>

                <div class="mb-3">
                    <label class="form-label">描述</label>
                    <textarea class="form-control" id="credDescription" rows="3" placeholder="可选，描述此凭据的用途"></textarea>
                </div>

                <div class="d-flex justify-content-end gap-2">
                    <button type="button" class="btn btn-secondary" onclick="CredentialCore.closeModal()">取消</button>
                    <button type="submit" class="btn btn-primary">
                        <i class="bi bi-check-circle"></i> 保存
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>

<!-- Bootstrap JS -->
<script src="/static/vendor/bootstrap/bootstrap.bundle.min.js"></script>

<!-- 通用组件 -->
<script src="/static/components/utils/format.js"></script>
<script src="/static/components/utils/http.js"></script>
<script src="/static/components/toast/toast.js"></script>
<script src="/static/components/modal/modal.js"></script>

<!-- 加载凭据模块 -->
<script src="/static/modules/credential/credential.js"></script>
<script src="/static/modules/credential/index.js"></script>

<script>
    // 初始化模块
    CredentialModule.init();
</script>

</body>
</html>
{{end}}
